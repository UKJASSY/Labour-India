<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labour India</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #ff6b00;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      background: #ff6b00;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #e55d00;
    }
  </style>
</head>

<body>

<header>
  Labour India 🇮🇳
</header>

<div class="container">
  <div class="card">
    
    <h3>Find Labour</h3>

    <input type="text" placeholder="Enter Location">

    <select>
      <option>Select Labour Type</option>
      <option>Electrician</option>
      <option>Plumber</option>
      <option>Painter</option>
      <option>Carpenter</option>
      <option>Helper</option>
    </select>

    <button onclick="findLabour()">Find Labour</button>

  </div>
</div>

<script>
  function findLabour() {
    alert("Searching labour near you...");
  }
</script>

</body>
</html>
