<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour India</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #ff6b00;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: #ff6b00;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #e55d00;
}
</style>

</head>

<body>

<header>Labour India 🇮🇳</header>

<div class="container">

  <div class="card">
    <h3>Book Service</h3>

    <input type="text" id="name" placeholder="Your Name">

    <input type="text" id="location" placeholder="Enter Location">

    <select id="category" onchange="toggleMaidNote()">
      <option value="">Select Service</option>
      <option value="Electrician">Electrician</option>
      <option value="Plumber">Plumber</option>
      <option value="Maid">Maid</option>
      <option value="Mistri">Mistri</option>
      <option value="Fitter">Fitter</option>
      <option value="Dhobi">Dhobi</option>
    </select>

    <textarea id="details" placeholder="Work details (optional)"></textarea>

    <p id="maidNote" style="display:none; color:green; font-size:14px;">
      Only female maids will be assigned 👩
    </p>

    <button onclick="bookLabour()">Book Now</button>

  </div>

</div>

<script>

function toggleMaidNote() {
  let category = document.getElementById("category").value;
  let note = document.getElementById("maidNote");

  if(category === "Maid"){
    note.style.display = "block";
  } else {
    note.style.display = "none";
  }
}

function bookLabour() {
  let name = document.getElementById("name").value;
  let location = document.getElementById("location").value;
  let category = document.getElementById("category").value;
  let details = document.getElementById("details").value;

  if(name === "" || location === "" || category === ""){
    alert("Please fill all required fields");
    return;
  }

  let message = `Hello, I want to book a service:

Name: ${name}
Service: ${category}
Location: ${location}
Details: ${details}`;

  // 👇 Yaha apna number daal (without +)
  let phone = "91XXXXXXXXXX";

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, "_blank");
}

</script>

</body>
</html>
