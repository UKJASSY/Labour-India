<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour India</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f4f9;
}

/* HEADER */
header {
  background: #0d47a1;
  color: white;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 20px;
  font-weight: bold;
}

header img {
  height: 40px;
}

/* CONTAINER */
.container {
  padding: 15px;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  background: #0d47a1;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 17px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #08306b;
}

/* SERVICES ICON GRID */
.services {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.service-box {
  background: #e3f2fd;
  padding: 10px;
  text-align: center;
  border-radius: 10px;
  font-size: 13px;
}

/* FLOATING WHATSAPP */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  text-decoration: none;
}
</style>

</head>

<body>

<header>
  <img src="logo.png">
  Labour India 🇮🇳
</header>

<div class="container">

  <div class="card">
    <h3>Book Service</h3>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="location" placeholder="Enter Location">

    <select id="category" onchange="toggleMaidNote()">
      <option value="">Select Service</option>
      <option value="Electrician">Electrician</option>
      <option value="Plumber">Plumber</option>
      <option value="Maid">Maid</option>
      <option value="Mistri">Mistri</option>
      <option value="Fitter">Fitter</option>
      <option value="Dhobi">Dhobi</option>
    </select>

    <textarea id="details" placeholder="Work details (optional)"></textarea>

    <p id="maidNote" style="display:none; color:green; font-size:14px;">
      Only female maids will be assigned 👩
    </p>

    <button onclick="bookLabour()">Book Now</button>

    <!-- SERVICES -->
    <div class="services">
      <div class="service-box">⚡ Electrician</div>
      <div class="service-box">🚿 Plumber</div>
      <div class="service-box">👩 Maid</div>
      <div class="service-box">🧱 Mistri</div>
      <div class="service-box">🔧 Fitter</div>
      <div class="service-box">👕 Dhobi</div>
    </div>

  </div>

</div>

<!-- FLOATING WHATSAPP -->
<a class="whatsapp-float" href="https://wa.me/91XXXXXXXXXX" target="_blank">💬</a>

<script>

function toggleMaidNote() {
  let category = document.getElementById("category").value;
  let note = document.getElementById("maidNote");

  if(category === "Maid"){
    note.style.display = "block";
  } else {
    note.style.display = "none";
  }
}

function bookLabour() {
  let name = document.getElementById("name").value;
  let location = document.getElementById("location").value;
  let category = document.getElementById("category").value;
  let details = document.getElementById("details").value;

  if(name === "" || location === "" || category === ""){
    alert("Please fill all required fields");
    return;
  }

  let message = `Hello, I want to book a service:

Name: ${name}
Service: ${category}
Location: ${location}
Details: ${details}`;

  let phone = "91XXXXXXXXXX";

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, "_blank");
}

</script>

</body>
</html>
