<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour India</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #ff6b00;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #ff6b00;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.labour-card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.labour-name {
  font-size: 18px;
  font-weight: bold;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.call-btn {
  background: green;
}

.whatsapp-btn {
  background: #25D366;
}
</style>

</head>

<body>

<header>Labour India 🇮🇳</header>

<div class="container">

  <div class="card">
    <h3>Find Labour</h3>

    <input type="text" id="location" placeholder="Enter Location">

    <select id="category">
      <option value="">Select Labour Type</option>
      <option value="Electrician">Electrician</option>
      <option value="Plumber">Plumber</option>
      <option value="Maid">Maid</option>
      <option value="Mistri">Mistri</option>
      <option value="Fitter">Fitter</option>
      <option value="Dhobi">Dhobi</option>
    </select>

    <button onclick="searchLabour()">Search</button>
  </div>

  <div id="results"></div>

</div>

<script>

const labours = [
  {name:"Ramesh", work:"Electrician", location:"Delhi", phone:"9876543210"},
  {name:"Suresh", work:"Plumber", location:"Delhi", phone:"9123456780"},
  {name:"Amit", work:"Maid", location:"Noida", phone:"9012345678"},
  {name:"Rahul", work:"Mistri", location:"Delhi", phone:"9988776655"},
  {name:"Vikas", work:"Fitter", location:"Gurgaon", phone:"8899776655"},
  {name:"Mohan", work:"Dhobi", location:"Delhi", phone:"8877665544"}
];

function searchLabour() {
  let category = document.getElementById("category").value;
  let resultsDiv = document.getElementById("results");

  resultsDiv.innerHTML = "";

  let filtered = labours.filter(l => 
    (category === "" || l.work === category)
  );

  if(filtered.length === 0){
    resultsDiv.innerHTML = "<p>No labour found</p>";
    return;
  }

  filtered.forEach(l => {
    resultsDiv.innerHTML += `
      <div class="labour-card">
        <div class="labour-name">${l.name}</div>
        <div>${l.work} • ${l.location}</div>

        <div class="actions">
          <button class="call-btn" onclick="call('${l.phone}')">Call</button>
          <button class="whatsapp-btn" onclick="whatsapp('${l.phone}')">WhatsApp</button>
        </div>
      </div>
    `;
  });
}

function call(num){
  window.location.href = "tel:" + num;
}

function whatsapp(num){
  window.open("https://wa.me/91" + num, "_blank");
}

</script>

</body>
</html>
