<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour India</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f4f9;
}

header {
  background: #0d47a1;
  color: white;
  padding: 12px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  background: #0d47a1;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 17px;
  cursor: pointer;
}

button:hover {
  background: #08306b;
}
</style>

</head>

<body>

<header>Labour India 🇮🇳</header>

<div class="container">
  <div class="card">

    <h3>Book Service</h3>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="location" placeholder="Enter Location">

    <select id="category">
      <option value="">Select Service</option>
      <option value="Electrician">Electrician</option>
      <option value="Plumber">Plumber</option>
      <option value="Maid">Maid</option>
      <option value="Mistri">Mistri</option>
      <option value="Fitter">Fitter</option>
      <option value="Dhobi">Dhobi</option>
    </select>

    <textarea id="details" placeholder="Work details"></textarea>

    <button onclick="bookLabour()">Book Now</button>

    <p id="status" style="margin-top:10px;color:green;"></p>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDnKnye9eVcaX2B84HVaTElXTIgOKz6SDA",
  authDomain: "labour-india-4746e.firebaseapp.com",
  projectId: "labour-india-4746e",
  storageBucket: "labour-india-4746e.firebasestorage.app",
  messagingSenderId: "241559783436",
  appId: "1:241559783436:web:b867e149f0f0fcd1bf4629",
  databaseURL: "https://labour-india-4746e-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.bookLabour = function() {

  let name = document.getElementById("name").value;
  let location = document.getElementById("location").value;
  let category = document.getElementById("category").value;
  let details = document.getElementById("details").value;

  if(name === "" || location === "" || category === ""){
    alert("Fill all required fields");
    return;
  }

  push(ref(db, "bookings"), {
    name,
    location,
    category,
    details,
    status: "pending",
    time: new Date().toLocaleString()
  });

  document.getElementById("status").innerText = "✅ Booking submitted successfully!";

}

</script>

</body>
</html>
