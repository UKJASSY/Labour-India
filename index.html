<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Labour India Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f1f4f9}
.header{background:#0d47a1;color:white;padding:15px;text-align:center}
.page{display:none;padding:15px}
.active{display:block}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin-top:10px}
button{width:100%;padding:10px;margin-top:10px;background:#0d47a1;color:white;border:none}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:white}
.nav button{flex:1}
</style>
</head>

<body>

<div class="header">Labour India 🚀</div>

<div id="user" class="page active">
<div class="card">
<input id="name" placeholder="Name">
<input id="location" placeholder="Location">
<select id="category">
<option>Electrician</option>
<option>Plumber</option>
<option>Maid</option>
<option>Mistri</option>
</select>
<button onclick="book()">Book</button>
</div>
</div>

<div id="worker" class="page">
<div class="card">
<input id="workerName" placeholder="Name">
<select id="workerCategory">
<option>Electrician</option>
<option>Plumber</option>
<option>Maid</option>
<option>Mistri</option>
</select>
<button onclick="startWorker()">Start</button>
</div>
<div id="jobs"></div>
</div>

<div class="nav">
<button onclick="show('user')">User</button>
<button onclick="show('worker')">Worker</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-messaging.js";

const app = initializeApp({
apiKey:"AIzaSyDnKnye9eVcaX2B84HVaTElXTIgOKz6SDA",
databaseURL:"https://labour-india-4746e-default-rtdb.asia-southeast1.firebasedatabase.app/"
});

const db = getDatabase(app);
const messaging = getMessaging(app);

let currentToken = null;

/* 🔔 TOKEN GENERATE */
getToken(messaging, {
  vapidKey: "BLtSP0faxDhSR-0ZiZRmtDtTXTqozC9eOpDfonKCKr9BGlmf_ylXcX36C4d5IBXypv45lqIxBHY88XNSOxtT--E"
}).then((token) => {

  if(token){
    console.log("TOKEN:", token);
    currentToken = token;
  }

});

/* 🔔 FOREGROUND RECEIVE */
onMessage(messaging, (payload) => {
  alert("🔔 " + payload.notification.title);
});

/* NAV */
window.show = p=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* USER BOOK */
window.book=()=>{
push(ref(db,"jobs"),{
name:name.value,
location:location.value,
category:category.value,
status:"pending"
});
alert("Booking Created");
}

/* WORKER */
let worker={};

window.startWorker=()=>{
worker={
name:workerName.value,
category:workerCategory.value
};

if(!currentToken){
alert("Notification allow karo pehle");
return;
}

/* ✅ TOKEN SAVE */
update(ref(db,"workers/"+worker.name),{
name:worker.name,
category:worker.category,
token:currentToken
});

/* JOB LIST */
onValue(ref(db,"jobs"),snap=>{
jobs.innerHTML="";
snap.forEach(c=>{
let d=c.val();
let id=c.key;

if(d.status==="pending" && d.category===worker.category){
update(ref(db,"jobs/"+id),{
status:"accepted",
worker:worker.name
});
}

if(d.worker===worker.name){
jobs.innerHTML+=`
<div class="card">
${d.category}<br>
${d.location}<br>
<button onclick="done('${id}')">Done</button>
</div>`;
}
});
});
}

/* DONE */
window.done=id=>{
update(ref(db,"jobs/"+id),{status:"done"});
}

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("firebase-messaging-sw.js");
}

</script>

</body>
</html>
