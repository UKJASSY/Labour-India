<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Labour India Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f1f4f9;
}

/* HEADER */
.header{
background:linear-gradient(45deg,#0d47a1,#1976d2);
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

/* PAGE */
.page{display:none;padding:15px}
.active{display:block}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#0d47a1;
color:white;
border:none;
border-radius:8px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
border-top:1px solid #ccc;
}

.nav button{
flex:1;
padding:10px;
background:none;
border:none;
}

.nav .active{
color:#0d47a1;
font-weight:bold;
}

/* DASHBOARD */
.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#1976d2;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">Labour India 🚀</div>

<!-- USER -->
<div id="user" class="page active">
<div class="card">
<h3>Book Service</h3>
<input id="name" placeholder="Name">
<input id="location" placeholder="Location">
<select id="category">
<option>Electrician</option>
<option>Plumber</option>
<option>Maid</option>
<option>Mistri</option>
</select>
<button onclick="book()">Book</button>
</div>
</div>

<!-- WORKER -->
<div id="worker" class="page">
<div class="card">
<h3>Worker</h3>
<input id="workerName" placeholder="Name">
<select id="workerCategory">
<option>Electrician</option>
<option>Plumber</option>
<option>Maid</option>
<option>Mistri</option>
</select>
<button onclick="startWorker()">Go Online</button>
</div>
<div id="jobs"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">

<div class="card">
<h3>Admin Login</h3>
<input id="adminPass">
<button onclick="loginAdmin()">Login</button>
</div>

<div id="dashboard" style="display:none">

<div class="stats">
<div class="stat">Total<br><span id="total">0</span></div>
<div class="stat">Pending<br><span id="pending">0</span></div>
<div class="stat">Done<br><span id="done">0</span></div>
</div>

<div id="adminJobs"></div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('user')" class="active">User</button>
<button onclick="show('worker')">Worker</button>
<button onclick="show('admin')">Admin</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
  import { initializeApp } from ...
import { getDatabase, ref, push, onValue, update } from ...
const app=initializeApp({
apiKey:"AIzaSyDnKnye9eVcaX2B84HVaTElXTIgOKz6SDA",
databaseURL:"https://labour-india-4746e-default-rtdb.asia-southeast1.firebasedatabase.app/"
});
const db=getDatabase(app);

/* NAV */
window.show=p=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* USER */
window.book=()=>{
push(ref(db,"jobs"),{
name:name.value,
location:location.value,
category:category.value,
status:"pending"
});
alert("Job Created 🔔");
}

/* WORKER */
let worker={};

window.startWorker=()=>{
worker={
name:workerName.value,
category:workerCategory.value
};

onValue(ref(db,"jobs"),snap=>{
jobs.innerHTML="";
snap.forEach(c=>{
let d=c.val();
let id=c.key;

if(d.status==="pending" && d.category===worker.category){
update(ref(db,"jobs/"+id),{
status:"accepted",
worker:worker.name
});
alert("New Job Assigned 🔔");
}

if(d.worker===worker.name){
jobs.innerHTML+=`
<div class="card">
${d.category}<br>
${d.location}<br>
Status:${d.status}
<button onclick="done('${id}')">Done</button>
</div>`;
}
});
});
}

window.done=id=>{
update(ref(db,"jobs/"+id),{status:"done"});
alert("Job Completed ✅");
}

/* ADMIN */
window.loginAdmin=()=>{
if(adminPass.value==="1234"){
dashboard.style.display="block";

onValue(ref(db,"jobs"),snap=>{

let t=0,p=0,d=0;
adminJobs.innerHTML="";

snap.forEach(c=>{
let j=c.val();
t++;

if(j.status==="pending")p++;
if(j.status==="done")d++;

adminJobs.innerHTML+=`
<div class="card">
${j.name} - ${j.category}<br>
${j.location}<br>
Status:${j.status}
</div>`;
});

total.innerText=t;
pending.innerText=p;
done.innerText=d;

});

}else alert("Wrong password");
}

</script>

</body>
</html>
